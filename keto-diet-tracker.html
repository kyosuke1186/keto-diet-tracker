<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="theme-color" content="#146c78">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-title" content="体重管理">
  <meta name="apple-mobile-web-app-status-bar-style" content="default">
  <link rel="manifest" href="keto-manifest.webmanifest">
  <link rel="icon" href="keto-icon.svg" type="image/svg+xml">
  <link rel="apple-touch-icon" href="keto-icon-192.png">
  <title>体重管理</title>
  <style>
    * { box-sizing: border-box; }

    :root {
      --bg: #f5f7f4;
      --surface: #ffffff;
      --ink: #162225;
      --muted: #687577;
      --line: #dce4df;
      --teal: #146c78;
      --teal-dark: #0d5560;
      --green: #2d7a4f;
      --blue: #326ea8;
      --amber: #b7781c;
      --red: #b74b46;
      --soft: #e7f3f2;
      --shadow: 0 10px 28px rgba(22, 34, 37, 0.08);
      --radius: 8px;
    }

    body {
      margin: 0;
      color: var(--ink);
      background:
        linear-gradient(180deg, rgba(245, 247, 244, 0.96), rgba(245, 247, 244, 1)),
        repeating-linear-gradient(90deg, rgba(20, 108, 120, 0.05) 0 1px, transparent 1px 78px);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "Helvetica Neue", Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
    }

    button, input, select, textarea { font: inherit; }
    button { cursor: pointer; }

    .app {
      min-height: 100vh;
      display: grid;
      grid-template-columns: 320px minmax(0, 1fr);
    }

    aside {
      height: 100vh;
      position: sticky;
      top: 0;
      overflow-y: auto;
      overscroll-behavior: contain;
      border-right: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.84);
      padding: 18px;
      display: grid;
      align-content: start;
      gap: 14px;
    }

    main {
      height: 100vh;
      overflow-y: auto;
      overscroll-behavior: contain;
      padding: 18px;
      display: grid;
      align-content: start;
      gap: 14px;
    }

    h1, h2, h3 {
      margin: 0;
      letter-spacing: 0;
    }

    h1 { font-size: 21px; }
    h2 { font-size: 22px; }
    h3 { font-size: 15px; }

    .brand {
      display: flex;
      align-items: center;
      gap: 12px;
      padding-bottom: 13px;
      border-bottom: 1px solid var(--line);
    }

    .brand-mark {
      width: 44px;
      height: 44px;
      border-radius: 8px;
      display: grid;
      place-items: center;
      color: #fff;
      background: linear-gradient(135deg, var(--teal), var(--blue));
      font-size: 18px;
      font-weight: 900;
      box-shadow: inset 0 -10px 18px rgba(0, 0, 0, 0.12);
    }

    .mini-note,
    .brand p {
      margin: 2px 0 0;
      color: var(--muted);
      font-size: 12px;
    }

    .panel,
    .metric-card,
    .hero {
      border: 1px solid var(--line);
      border-radius: var(--radius);
      background: var(--surface);
      box-shadow: var(--shadow);
    }

    .panel { overflow: hidden; }

    .panel-head {
      padding: 13px 15px;
      border-bottom: 1px solid var(--line);
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 10px;
    }

    .panel-body {
      padding: 15px;
      display: grid;
      gap: 12px;
    }

    .field {
      display: grid;
      gap: 5px;
    }

    label {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    input, select, textarea {
      width: 100%;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #fff;
      color: var(--ink);
      padding: 10px 11px;
      outline: none;
    }

    textarea {
      min-height: 74px;
      resize: vertical;
    }

    input:focus,
    select:focus,
    textarea:focus {
      border-color: var(--teal);
      box-shadow: 0 0 0 3px rgba(20, 108, 120, 0.14);
    }

    .grid-2 {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 9px;
    }

    .btn-row {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
    }

    .btn {
      min-height: 40px;
      border: 1px solid transparent;
      border-radius: 6px;
      padding: 8px 12px;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 7px;
      font-weight: 800;
      white-space: nowrap;
    }

    .btn-primary {
      color: #fff;
      background: var(--teal);
    }

    .btn-primary:hover { background: var(--teal-dark); }

    .btn-ghost {
      color: var(--ink);
      background: #fff;
      border-color: var(--line);
    }

    .btn-ghost:hover {
      border-color: var(--teal);
      color: var(--teal-dark);
    }

    .btn-danger {
      color: var(--red);
      background: #fff7f6;
      border-color: #efc8c4;
    }

    .sync-status {
      display: grid;
      gap: 4px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: 6px;
      background: #f7faf7;
      color: var(--muted);
      font-size: 12px;
    }

    .sync-status strong {
      color: var(--ink);
      font-size: 13px;
    }

    .hero {
      padding: 18px;
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(260px, 0.58fr);
      gap: 16px;
      align-items: center;
      background:
        linear-gradient(135deg, #ffffff 0%, #f2faf9 58%, #eef5fb 100%);
    }

    .current-block {
      display: grid;
      gap: 8px;
    }

    .current-label {
      color: var(--muted);
      font-size: 13px;
      font-weight: 800;
    }

    .current-number {
      font-size: 56px;
      line-height: 0.95;
      font-weight: 900;
      letter-spacing: 0;
    }

    .current-number small {
      font-size: 19px;
      color: var(--muted);
      font-weight: 800;
    }

    .status-pill {
      width: fit-content;
      border-radius: 999px;
      padding: 7px 12px;
      color: var(--teal-dark);
      background: var(--soft);
      font-weight: 900;
    }

    .meter {
      height: 13px;
      background: #e4ebe7;
      border-radius: 999px;
      overflow: hidden;
    }

    .meter-fill {
      height: 100%;
      width: 0%;
      background: var(--teal);
      border-radius: 999px;
      transition: width 0.2s ease;
    }

    .metric-grid {
      display: grid;
      grid-template-columns: repeat(4, minmax(0, 1fr));
      gap: 10px;
    }

    .metric-card {
      min-height: 96px;
      padding: 13px;
      display: grid;
      align-content: space-between;
      gap: 8px;
    }

    .metric-card span {
      color: var(--muted);
      font-size: 12px;
      font-weight: 800;
    }

    .metric-card strong {
      font-size: 25px;
      line-height: 1;
    }

    .content-grid {
      display: grid;
      grid-template-columns: minmax(0, 1fr) minmax(330px, 0.9fr);
      gap: 14px;
      align-items: start;
    }

    .range-control {
      display: inline-flex;
      border: 1px solid var(--line);
      border-radius: 8px;
      background: #fff;
      padding: 3px;
    }

    .range-control button {
      min-width: 48px;
      border: 0;
      border-radius: 6px;
      padding: 7px 9px;
      color: var(--muted);
      background: transparent;
      font-weight: 800;
    }

    .range-control button.active {
      color: #fff;
      background: var(--ink);
    }

    .chart-wrap {
      width: 100%;
      height: 360px;
      position: relative;
    }

    canvas {
      display: block;
      width: 100%;
      height: 100%;
    }

    .table-wrap {
      overflow-x: auto;
      max-height: 460px;
    }

    table {
      width: 100%;
      min-width: 640px;
      border-collapse: collapse;
      font-size: 13px;
    }

    th, td {
      border-bottom: 1px solid var(--line);
      padding: 9px 10px;
      text-align: left;
      vertical-align: top;
    }

    th {
      position: sticky;
      top: 0;
      z-index: 1;
      color: var(--muted);
      background: #f8faf6;
      font-size: 12px;
    }

    .num {
      text-align: right;
      white-space: nowrap;
    }

    .good { color: var(--green); }
    .warn { color: var(--amber); }
    .bad { color: var(--red); }
    .blue { color: var(--blue); }

    .empty {
      border: 1px dashed var(--line);
      border-radius: 8px;
      padding: 24px 12px;
      color: var(--muted);
      text-align: center;
      background: #fbfcfa;
    }

    .toast {
      position: fixed;
      left: 50%;
      bottom: 18px;
      z-index: 20;
      transform: translateX(-50%) translateY(16px);
      opacity: 0;
      pointer-events: none;
      border-radius: 8px;
      padding: 10px 14px;
      color: #fff;
      background: var(--ink);
      box-shadow: var(--shadow);
      transition: opacity 0.18s ease, transform 0.18s ease;
    }

    .toast.show {
      opacity: 1;
      transform: translateX(-50%) translateY(0);
    }

    @media (max-width: 1040px) {
      .app {
        height: auto;
        grid-template-columns: 1fr;
      }

      aside {
        position: static;
        height: auto;
        overflow: visible;
        border-right: 0;
        border-bottom: 1px solid var(--line);
      }

      main {
        height: auto;
        overflow: visible;
      }

      .content-grid,
      .hero {
        grid-template-columns: 1fr;
      }

      .metric-grid {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
    }

    @media (max-width: 680px) {
      main, aside { padding: 14px; }

      .current-number { font-size: 48px; }

      .grid-2,
      .metric-grid {
        grid-template-columns: 1fr 1fr;
      }

      .chart-wrap { height: 310px; }
    }
  </style>
</head>
<body>
  <div class="app">
    <aside>
      <div class="brand">
        <div class="brand-mark">W</div>
        <div>
          <h1>体重管理</h1>
          <p>体重だけを毎日シンプルに見る</p>
        </div>
      </div>

      <section class="panel">
        <div class="panel-head">
          <h3>今日の記録</h3>
        </div>
        <div class="panel-body">
          <div class="grid-2">
            <div class="field">
              <label for="weightDateInput">日付</label>
              <input id="weightDateInput" type="date">
            </div>
            <div class="field">
              <label for="weightSlotInput">タイミング</label>
              <select id="weightSlotInput">
                <option value="morning">朝</option>
                <option value="evening">夜</option>
              </select>
            </div>
          </div>
          <div class="field">
            <label for="weightInput">体重 kg</label>
            <input id="weightInput" type="number" step="0.1" min="30" max="250" placeholder="83.8">
          </div>
          <div class="field">
            <label for="noteInput">メモ</label>
            <textarea id="noteInput" placeholder="例: むくみあり / 外食後 / よく眠れた"></textarea>
          </div>
          <button id="saveWeightBtn" class="btn btn-primary" type="button">体重を保存</button>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h3>目標設定</h3>
        </div>
        <div class="panel-body">
          <div class="grid-2">
            <div class="field">
              <label for="heightInput">身長 cm</label>
              <input id="heightInput" type="number" step="0.1" min="100" max="230">
            </div>
            <div class="field">
              <label for="startWeightInput">開始体重 kg</label>
              <input id="startWeightInput" type="number" step="0.1" min="30" max="250">
            </div>
            <div class="field">
              <label for="goalWeightInput">目標体重 kg</label>
              <input id="goalWeightInput" type="number" step="0.1" min="30" max="250">
            </div>
            <div class="field">
              <label for="displaySlotInput">グラフ基準</label>
              <select id="displaySlotInput">
                <option value="morning">朝を優先</option>
                <option value="evening">夜を優先</option>
                <option value="average">朝夜平均</option>
              </select>
            </div>
          </div>
          <button id="saveSettingsBtn" class="btn btn-ghost" type="button">設定を保存</button>
          <p class="mini-note">初期値: 174cm / 85kg開始 / 70kg目標</p>
        </div>
      </section>

      <section class="panel" hidden>
        <div class="panel-head">
          <h3>同期</h3>
        </div>
        <div class="panel-body">
          <div class="field">
            <label for="syncUrlInput">Google同期URL</label>
            <input id="syncUrlInput" type="url" inputmode="url">
          </div>
          <div class="field">
            <label for="syncTokenInput">同期キー</label>
            <input id="syncTokenInput" type="password" autocomplete="off">
          </div>
          <div class="btn-row">
            <button id="saveSyncBtn" class="btn btn-ghost" type="button">URL保存</button>
            <button id="pullSyncBtn" class="btn btn-ghost" type="button">読み込み</button>
            <button id="pushSyncBtn" class="btn btn-primary" type="button">同期</button>
          </div>
          <div class="sync-status">
            <strong id="syncStatusLabel">未設定</strong>
            <span id="syncStatusDetail">Googleスプレッドシートと連動します。</span>
          </div>
        </div>
      </section>

      <section class="panel">
        <div class="panel-head">
          <h3>データ</h3>
        </div>
        <div class="panel-body">
          <div class="btn-row">
            <button id="exportBtn" class="btn btn-ghost" type="button">JSON出力</button>
            <label class="btn btn-ghost">JSON読込<input id="importInput" type="file" accept="application/json,.json" hidden></label>
          </div>
          <button id="clearBtn" class="btn btn-danger" type="button">全削除</button>
          <p class="mini-note">保存はこの端末とGoogleスプレッドシートに反映します。</p>
        </div>
      </section>
    </aside>

    <main>
      <section class="hero">
        <div class="current-block">
          <div class="current-label">現在の体重</div>
          <div id="currentWeight" class="current-number">--<small>kg</small></div>
          <div id="statusPill" class="status-pill">まだ記録がありません</div>
          <p id="goalNote" class="mini-note"></p>
        </div>
        <div class="current-block">
          <div class="current-label">目標までの進み具合</div>
          <div class="meter"><div id="goalMeter" class="meter-fill"></div></div>
          <div class="grid-2">
            <div>
              <div class="mini-note">開始</div>
              <strong id="startWeightLabel">85.0kg</strong>
            </div>
            <div>
              <div class="mini-note">目標</div>
              <strong id="goalWeightLabel">70.0kg</strong>
            </div>
          </div>
        </div>
      </section>

      <section class="metric-grid">
        <div class="metric-card">
          <span>開始から</span>
          <strong id="lostFromStart">--kg</strong>
        </div>
        <div class="metric-card">
          <span>目標まで</span>
          <strong id="toGoalWeight">--kg</strong>
        </div>
        <div class="metric-card">
          <span>7日平均</span>
          <strong id="avg7Weight">--kg</strong>
        </div>
        <div class="metric-card">
          <span>今週の変化</span>
          <strong id="weekChange">--kg</strong>
        </div>
      </section>

      <section class="content-grid">
        <section class="panel">
          <div class="panel-head">
            <h2>体重推移</h2>
            <div class="range-control">
              <button type="button" data-range="7">7日</button>
              <button type="button" data-range="30" class="active">30日</button>
              <button type="button" data-range="all">全期間</button>
            </div>
          </div>
          <div class="panel-body">
            <div class="chart-wrap">
              <canvas id="weightChart"></canvas>
            </div>
            <p class="mini-note">線: 体重 / 薄線: 7日平均 / 点線: 目標体重</p>
          </div>
        </section>

        <section class="panel">
          <div class="panel-head">
            <h2>記録一覧</h2>
            <span id="recordCount" class="mini-note"></span>
          </div>
          <div class="table-wrap">
            <table>
              <thead>
                <tr>
                  <th>日付</th>
                  <th>朝</th>
                  <th>夜</th>
                  <th>表示体重</th>
                  <th>前日差</th>
                  <th>メモ</th>
                  <th></th>
                </tr>
              </thead>
              <tbody id="recordTable"></tbody>
            </table>
          </div>
        </section>
      </section>
    </main>
  </div>

  <div id="toast" class="toast"></div>

  <script>
    const STORAGE_KEY = "weight-tracker-app-v1";
    const SYNC_STORAGE_KEY = "weight-tracker-sync-v1";
    const SLOT_LABELS = { morning: "朝", evening: "夜" };
    const RANGE_DAYS = { "7": 7, "30": 30, all: null };

    const state = {
      settings: {
        height: 174,
        startWeight: 85,
        goalWeight: 70,
        displaySlot: "morning"
      },
      weights: [],
      range: "30",
      sync: {
        url: "",
        token: "",
        lastPulledAt: "",
        lastPushedAt: "",
        pending: false
      }
    };

    const el = {
      weightDate: document.getElementById("weightDateInput"),
      weightSlot: document.getElementById("weightSlotInput"),
      weight: document.getElementById("weightInput"),
      note: document.getElementById("noteInput"),
      saveWeight: document.getElementById("saveWeightBtn"),
      height: document.getElementById("heightInput"),
      startWeight: document.getElementById("startWeightInput"),
      goalWeight: document.getElementById("goalWeightInput"),
      displaySlot: document.getElementById("displaySlotInput"),
      saveSettings: document.getElementById("saveSettingsBtn"),
      currentWeight: document.getElementById("currentWeight"),
      statusPill: document.getElementById("statusPill"),
      goalNote: document.getElementById("goalNote"),
      goalMeter: document.getElementById("goalMeter"),
      startWeightLabel: document.getElementById("startWeightLabel"),
      goalWeightLabel: document.getElementById("goalWeightLabel"),
      lostFromStart: document.getElementById("lostFromStart"),
      toGoalWeight: document.getElementById("toGoalWeight"),
      avg7Weight: document.getElementById("avg7Weight"),
      weekChange: document.getElementById("weekChange"),
      weightChart: document.getElementById("weightChart"),
      recordTable: document.getElementById("recordTable"),
      recordCount: document.getElementById("recordCount"),
      syncUrl: document.getElementById("syncUrlInput"),
      syncToken: document.getElementById("syncTokenInput"),
      saveSync: document.getElementById("saveSyncBtn"),
      pullSync: document.getElementById("pullSyncBtn"),
      pushSync: document.getElementById("pushSyncBtn"),
      syncStatusLabel: document.getElementById("syncStatusLabel"),
      syncStatusDetail: document.getElementById("syncStatusDetail"),
      exportBtn: document.getElementById("exportBtn"),
      importInput: document.getElementById("importInput"),
      clearBtn: document.getElementById("clearBtn"),
      toast: document.getElementById("toast")
    };

    function todayIso() {
      const now = new Date();
      now.setMinutes(now.getMinutes() - now.getTimezoneOffset());
      return now.toISOString().slice(0, 10);
    }

    function load() {
      try {
        const saved = JSON.parse(localStorage.getItem(STORAGE_KEY) || "{}");
        Object.assign(state.settings, saved.settings || {});
        state.weights = Array.isArray(saved.weights) ? saved.weights : [];
      } catch {
        state.weights = [];
      }

      try {
        Object.assign(state.sync, JSON.parse(localStorage.getItem(SYNC_STORAGE_KEY) || "{}"));
      } catch {
        state.sync = { url: "", token: "", lastPulledAt: "", lastPushedAt: "", pending: false };
      }

      el.weightDate.value = todayIso();
      el.weightSlot.value = "morning";
      syncSettingsInputs();
      renderSyncStatus();
    }

    function syncSettingsInputs() {
      el.height.value = state.settings.height;
      el.startWeight.value = state.settings.startWeight;
      el.goalWeight.value = state.settings.goalWeight;
      el.displaySlot.value = state.settings.displaySlot || "morning";
      el.syncUrl.value = state.sync.url || "";
      el.syncToken.value = state.sync.token || "";
    }

    function save() {
      saveLocalOnly();
      queueAutoSync();
    }

    function saveLocalOnly() {
      localStorage.setItem(STORAGE_KEY, JSON.stringify(getAppData()));
      localStorage.setItem(SYNC_STORAGE_KEY, JSON.stringify(state.sync));
    }

    function getAppData() {
      return {
        settings: state.settings,
        weights: state.weights
      };
    }

    function applyAppData(data) {
      Object.assign(state.settings, data.settings || {});
      state.weights = Array.isArray(data.weights) ? data.weights : [];
      syncSettingsInputs();
      saveLocalOnly();
      render();
    }

    function mergeRecordLists(primary = [], secondary = []) {
      const records = new Map();
      const put = (record) => {
        if (!record || !record.id) return;
        const existing = records.get(record.id);
        if (!existing) {
          records.set(record.id, record);
          return;
        }
        const existingTime = Date.parse(existing.updatedAt || existing.createdAt || "") || 0;
        const recordTime = Date.parse(record.updatedAt || record.createdAt || "") || 0;
        if (recordTime >= existingTime) records.set(record.id, record);
      };
      primary.forEach(put);
      secondary.forEach(put);
      return Array.from(records.values()).sort((a, b) => String(a.date || "").localeCompare(String(b.date || "")));
    }

    function mergeAppData(remoteData = {}) {
      const localData = getAppData();
      return {
        settings: {
          ...localData.settings,
          ...(remoteData.settings || {})
        },
        weights: mergeRecordLists(remoteData.weights || [], localData.weights || [])
      };
    }

    function renderSyncStatus() {
      if (!state.sync.url) {
        el.syncStatusLabel.textContent = "自動同期";
        el.syncStatusDetail.textContent = "Googleスプレッドシートと連動します。";
        return;
      }
      const pushed = state.sync.lastPushedAt ? new Date(state.sync.lastPushedAt).toLocaleString("ja-JP") : "未実行";
      const pulled = state.sync.lastPulledAt ? new Date(state.sync.lastPulledAt).toLocaleString("ja-JP") : "未実行";
      el.syncStatusLabel.textContent = state.sync.pending ? "同期中" : "同期設定済み";
      el.syncStatusDetail.textContent = `最終同期: 送信 ${pushed} / 読込 ${pulled}`;
    }

    function syncUrl() {
      return String(state.sync.url || "").trim();
    }

    function syncToken() {
      return String(state.sync.token || "").trim();
    }

    function queueAutoSync() {
      if (!syncUrl()) return;
      window.clearTimeout(queueAutoSync.timer);
      queueAutoSync.timer = window.setTimeout(() => pushSync(true), 900);
    }

    function jsonp(url) {
      return new Promise((resolve, reject) => {
        const callback = `weightSync${Date.now()}${Math.floor(Math.random() * 100000)}`;
        const script = document.createElement("script");
        const cleanup = () => {
          delete window[callback];
          script.remove();
        };
        window[callback] = (payload) => {
          cleanup();
          resolve(payload);
        };
        script.onerror = () => {
          cleanup();
          reject(new Error("同期URLへ接続できませんでした"));
        };
        const separator = url.includes("?") ? "&" : "?";
        script.src = `${url}${separator}callback=${encodeURIComponent(callback)}&t=${Date.now()}`;
        document.body.appendChild(script);
      });
    }

    async function pullSync() {
      const url = syncUrl();
      if (!url) return;
      state.sync.pending = true;
      renderSyncStatus();
      try {
        const response = await jsonp(`${url}?action=load&token=${encodeURIComponent(syncToken())}`);
        if (!response || !response.ok) throw new Error(response && response.error ? response.error : "読み込みに失敗しました");
        applyAppData(mergeAppData(response.data || {}));
        state.sync.lastPulledAt = new Date().toISOString();
        state.sync.pending = false;
        saveLocalOnly();
        renderSyncStatus();
        pushSync(true);
      } catch (error) {
        state.sync.pending = false;
        saveLocalOnly();
        renderSyncStatus();
        showToast(error.message || "同期できませんでした");
      }
    }

    async function pushSync(silent = false) {
      const url = syncUrl();
      if (!url) {
        if (!silent) showToast("同期URLを設定してください");
        return;
      }
      state.sync.pending = true;
      renderSyncStatus();
      const form = new FormData();
      form.append("payload", JSON.stringify(getAppData()));
      form.append("token", syncToken());
      try {
        await fetch(url, { method: "POST", body: form, mode: "no-cors" });
        state.sync.lastPushedAt = new Date().toISOString();
        state.sync.pending = false;
        saveLocalOnly();
        renderSyncStatus();
        if (!silent) showToast("Googleへ同期しました");
      } catch {
        state.sync.pending = false;
        saveLocalOnly();
        renderSyncStatus();
        if (!silent) showToast("Googleへ同期できませんでした");
      }
    }

    function showToast(message) {
      el.toast.textContent = message;
      el.toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => el.toast.classList.remove("show"), 1800);
    }

    function numberOrNull(value) {
      const number = Number(value);
      return Number.isFinite(number) && number > 0 ? number : null;
    }

    function round(value, digits = 1) {
      const scale = 10 ** digits;
      return Math.round((Number(value) || 0) * scale) / scale;
    }

    function signed(value) {
      if (value === null || value === undefined || !Number.isFinite(value)) return "--kg";
      return `${value > 0 ? "+" : ""}${value.toFixed(1)}kg`;
    }

    function formatDate(iso) {
      const date = new Date(`${iso}T00:00:00`);
      return date.toLocaleDateString("ja-JP", { month: "numeric", day: "numeric", weekday: "short" });
    }

    function dateShift(iso, days) {
      const date = new Date(`${iso}T00:00:00`);
      date.setDate(date.getDate() + days);
      date.setMinutes(date.getMinutes() - date.getTimezoneOffset());
      return date.toISOString().slice(0, 10);
    }

    function dailyRows() {
      const rows = new Map();
      state.weights.forEach((entry) => {
        if (!entry.date) return;
        if (!rows.has(entry.date)) rows.set(entry.date, { date: entry.date, morning: null, evening: null, notes: [] });
        const row = rows.get(entry.date);
        if (entry.slot === "evening") row.evening = entry;
        else row.morning = entry;
        if (entry.note) row.notes.push(entry.note);
      });

      return Array.from(rows.values())
        .sort((a, b) => a.date.localeCompare(b.date))
        .map((row) => {
          row.displayWeight = displayWeightForRow(row);
          return row;
        })
        .filter((row) => row.displayWeight);
    }

    function displayWeightForRow(row) {
      const mode = state.settings.displaySlot || "morning";
      const morning = row.morning ? Number(row.morning.weight) : null;
      const evening = row.evening ? Number(row.evening.weight) : null;
      if (mode === "average" && morning && evening) return { weight: round((morning + evening) / 2), source: "平均" };
      if (mode === "evening") {
        if (evening) return { weight: evening, source: "夜" };
        if (morning) return { weight: morning, source: "朝" };
      }
      if (morning) return { weight: morning, source: "朝" };
      if (evening) return { weight: evening, source: "夜" };
      return null;
    }

    function visibleRows() {
      const rows = dailyRows();
      const days = RANGE_DAYS[state.range];
      if (!days || rows.length <= days) return rows;
      return rows.slice(-days);
    }

    function movingAverage(rows, index, windowSize = 7) {
      const start = Math.max(0, index - windowSize + 1);
      const subset = rows.slice(start, index + 1).map((row) => row.displayWeight.weight);
      if (!subset.length) return null;
      return subset.reduce((sum, value) => sum + value, 0) / subset.length;
    }

    function latestRow() {
      const rows = dailyRows();
      return rows.length ? rows[rows.length - 1] : null;
    }

    function averageSince(days) {
      const rows = dailyRows();
      const latest = latestRow();
      if (!latest) return null;
      const from = dateShift(latest.date, -days + 1);
      const values = rows.filter((row) => row.date >= from).map((row) => row.displayWeight.weight);
      if (!values.length) return null;
      return values.reduce((sum, value) => sum + value, 0) / values.length;
    }

    function render() {
      renderSummary();
      renderTable();
      drawWeightChart();
    }

    function renderSummary() {
      const latest = latestRow();
      const start = Number(state.settings.startWeight) || 85;
      const goal = Number(state.settings.goalWeight) || 70;
      const heightM = (Number(state.settings.height) || 174) / 100;
      const avg7 = averageSince(7);
      const rows = dailyRows();
      const weekAgo = latest ? rows.filter((row) => row.date <= dateShift(latest.date, -7)).pop() : null;

      el.startWeightLabel.textContent = `${start.toFixed(1)}kg`;
      el.goalWeightLabel.textContent = `${goal.toFixed(1)}kg`;

      if (!latest) {
        el.currentWeight.innerHTML = `--<small>kg</small>`;
        el.statusPill.textContent = "まだ記録がありません";
        el.goalNote.textContent = "最初の体重を入力すると推移が見えるようになります。";
        el.goalMeter.style.width = "0%";
        el.lostFromStart.textContent = "--kg";
        el.toGoalWeight.textContent = "--kg";
        el.avg7Weight.textContent = "--kg";
        el.weekChange.textContent = "--kg";
        return;
      }

      const current = latest.displayWeight.weight;
      const lost = current - start;
      const remaining = Math.max(0, current - goal);
      const totalTarget = Math.max(0.1, start - goal);
      const progress = Math.max(0, Math.min(100, ((start - current) / totalTarget) * 100));
      const bmi = heightM ? current / (heightM * heightM) : null;
      const weekDiff = weekAgo ? current - weekAgo.displayWeight.weight : null;

      el.currentWeight.innerHTML = `${current.toFixed(1)}<small>kg</small>`;
      el.statusPill.textContent = `${formatDate(latest.date)} ${latest.displayWeight.source}の記録`;
      el.goalNote.textContent = `BMI ${bmi ? bmi.toFixed(1) : "--"} / 目標まで あと${remaining.toFixed(1)}kg`;
      el.goalMeter.style.width = `${progress}%`;
      el.lostFromStart.textContent = signed(lost);
      el.lostFromStart.className = lost <= 0 ? "good" : "warn";
      el.toGoalWeight.textContent = `あと ${remaining.toFixed(1)}kg`;
      el.avg7Weight.textContent = avg7 ? `${avg7.toFixed(1)}kg` : "--kg";
      el.weekChange.textContent = weekDiff === null ? "--kg" : signed(weekDiff);
      el.weekChange.className = weekDiff === null ? "" : weekDiff <= 0 ? "good" : "warn";
    }

    function renderTable() {
      const rows = dailyRows().slice().reverse();
      el.recordCount.textContent = `${state.weights.length}件`;
      if (!rows.length) {
        el.recordTable.innerHTML = `<tr><td colspan="7"><div class="empty">体重を保存するとここに表示されます。</div></td></tr>`;
        return;
      }

      el.recordTable.innerHTML = rows.map((row, index) => {
        const previous = rows[index + 1];
        const diff = previous ? row.displayWeight.weight - previous.displayWeight.weight : null;
        const notes = Array.from(new Set(row.notes.filter(Boolean))).join(" / ");
        return `
          <tr>
            <td>${formatDate(row.date)}</td>
            <td class="num">${row.morning ? row.morning.weight.toFixed(1) : "--"}</td>
            <td class="num">${row.evening ? row.evening.weight.toFixed(1) : "--"}</td>
            <td class="num">${row.displayWeight.weight.toFixed(1)}kg</td>
            <td class="num ${diff === null ? "" : diff <= 0 ? "good" : "warn"}">${diff === null ? "--" : signed(diff)}</td>
            <td>${escapeHtml(notes || "")}</td>
            <td class="num"><button class="btn btn-ghost" type="button" data-edit-date="${row.date}">編集</button></td>
          </tr>
        `;
      }).join("");
    }

    function drawWeightChart() {
      const canvas = el.weightChart;
      const ctx = canvas.getContext("2d");
      const ratio = window.devicePixelRatio || 1;
      const rect = canvas.getBoundingClientRect();
      canvas.width = Math.max(1, Math.floor(rect.width * ratio));
      canvas.height = Math.max(1, Math.floor(rect.height * ratio));
      ctx.setTransform(ratio, 0, 0, ratio, 0, 0);

      const width = rect.width;
      const height = rect.height;
      ctx.clearRect(0, 0, width, height);

      const rows = visibleRows();
      if (!rows.length) {
        ctx.fillStyle = "#687577";
        ctx.font = "700 14px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif";
        ctx.textAlign = "center";
        ctx.fillText("体重を記録するとグラフが表示されます", width / 2, height / 2);
        return;
      }

      const pad = { top: 24, right: 18, bottom: 48, left: 48 };
      const chartW = width - pad.left - pad.right;
      const chartH = height - pad.top - pad.bottom;
      const values = rows.map((row) => row.displayWeight.weight);
      const goal = Number(state.settings.goalWeight) || 70;
      let min = Math.min(...values, goal);
      let max = Math.max(...values, Number(state.settings.startWeight) || 85);
      const spread = Math.max(1, max - min);
      min = Math.floor((min - spread * 0.14) * 10) / 10;
      max = Math.ceil((max + spread * 0.14) * 10) / 10;

      const xAt = (index) => pad.left + (rows.length === 1 ? chartW / 2 : (chartW * index) / (rows.length - 1));
      const yAt = (value) => pad.top + ((max - value) / (max - min)) * chartH;

      ctx.strokeStyle = "#e1e7e0";
      ctx.fillStyle = "#687577";
      ctx.font = "12px -apple-system, BlinkMacSystemFont, Segoe UI, sans-serif";
      ctx.textAlign = "right";
      ctx.textBaseline = "middle";
      for (let i = 0; i <= 4; i += 1) {
        const value = min + ((max - min) * i) / 4;
        const y = yAt(value);
        ctx.beginPath();
        ctx.moveTo(pad.left, y);
        ctx.lineTo(width - pad.right, y);
        ctx.stroke();
        ctx.fillText(value.toFixed(1), pad.left - 8, y);
      }

      const goalY = yAt(goal);
      ctx.strokeStyle = "#b7781c";
      ctx.setLineDash([5, 5]);
      ctx.beginPath();
      ctx.moveTo(pad.left, goalY);
      ctx.lineTo(width - pad.right, goalY);
      ctx.stroke();
      ctx.setLineDash([]);

      drawLine(ctx, rows.map((row, index) => ({ x: xAt(index), y: yAt(row.displayWeight.weight) })), "#146c78", 3);
      drawLine(ctx, rows.map((row, index) => ({ x: xAt(index), y: yAt(movingAverage(rows, index, 7)) })), "rgba(50, 110, 168, 0.55)", 2);

      rows.forEach((row, index) => {
        const x = xAt(index);
        const y = yAt(row.displayWeight.weight);
        ctx.fillStyle = "#fff";
        ctx.strokeStyle = "#146c78";
        ctx.lineWidth = 2;
        ctx.beginPath();
        ctx.arc(x, y, 4, 0, Math.PI * 2);
        ctx.fill();
        ctx.stroke();
      });

      const labels = rows.length <= 5 ? rows.map((_, index) => index) : [0, Math.floor((rows.length - 1) / 2), rows.length - 1];
      ctx.fillStyle = "#687577";
      ctx.textAlign = "center";
      ctx.textBaseline = "top";
      labels.forEach((index) => ctx.fillText(formatDate(rows[index].date).replace(" ", ""), xAt(index), height - pad.bottom + 18));
    }

    function drawLine(ctx, points, color, width) {
      const valid = points.filter((point) => Number.isFinite(point.y));
      if (!valid.length) return;
      ctx.strokeStyle = color;
      ctx.lineWidth = width;
      ctx.lineJoin = "round";
      ctx.lineCap = "round";
      ctx.beginPath();
      valid.forEach((point, index) => {
        if (index === 0) ctx.moveTo(point.x, point.y);
        else ctx.lineTo(point.x, point.y);
      });
      ctx.stroke();
    }

    function escapeHtml(value) {
      return String(value || "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    el.saveWeight.addEventListener("click", () => {
      const weight = numberOrNull(el.weight.value);
      if (!el.weightDate.value || !weight) {
        showToast("日付と体重を入力してください");
        return;
      }
      const now = new Date().toISOString();
      const entry = {
        id: `${el.weightDate.value}:${el.weightSlot.value}`,
        date: el.weightDate.value,
        slot: el.weightSlot.value,
        weight: round(weight),
        note: el.note.value.trim(),
        createdAt: now,
        updatedAt: now
      };
      const index = state.weights.findIndex((item) => item.id === entry.id);
      if (index >= 0) {
        entry.createdAt = state.weights[index].createdAt || now;
        state.weights[index] = entry;
      } else {
        state.weights.push(entry);
      }
      state.weights.sort((a, b) => a.date.localeCompare(b.date));
      save();
      render();
      showToast("体重を保存しました");
    });

    el.saveSettings.addEventListener("click", () => {
      state.settings.height = Number(el.height.value) || 174;
      state.settings.startWeight = Number(el.startWeight.value) || 85;
      state.settings.goalWeight = Number(el.goalWeight.value) || 70;
      state.settings.displaySlot = el.displaySlot.value || "morning";
      save();
      render();
      showToast("設定を保存しました");
    });

    el.recordTable.addEventListener("click", (event) => {
      const button = event.target.closest("[data-edit-date]");
      if (!button) return;
      const date = button.dataset.editDate;
      const row = dailyRows().find((item) => item.date === date);
      if (!row) return;
      const preferred = row[state.settings.displaySlot] || row.morning || row.evening;
      if (!preferred) return;
      el.weightDate.value = preferred.date;
      el.weightSlot.value = preferred.slot;
      el.weight.value = preferred.weight;
      el.note.value = preferred.note || "";
      el.weight.scrollIntoView({ behavior: "smooth", block: "center" });
    });

    el.weightDate.addEventListener("change", () => {
      const id = `${el.weightDate.value}:${el.weightSlot.value}`;
      const found = state.weights.find((entry) => entry.id === id);
      if (!found) return;
      el.weight.value = found.weight;
      el.note.value = found.note || "";
    });

    el.weightSlot.addEventListener("change", () => {
      const id = `${el.weightDate.value}:${el.weightSlot.value}`;
      const found = state.weights.find((entry) => entry.id === id);
      el.weight.value = found ? found.weight : "";
      el.note.value = found ? found.note || "" : "";
    });

    document.querySelectorAll("[data-range]").forEach((button) => {
      button.addEventListener("click", () => {
        state.range = button.dataset.range;
        document.querySelectorAll("[data-range]").forEach((item) => item.classList.toggle("active", item === button));
        drawWeightChart();
      });
    });

    el.saveSync.addEventListener("click", () => {
      state.sync.url = el.syncUrl.value.trim();
      state.sync.token = el.syncToken.value.trim();
      saveLocalOnly();
      renderSyncStatus();
      showToast(state.sync.url ? "同期設定を保存しました" : "同期URLを解除しました");
    });

    el.pullSync.addEventListener("click", pullSync);
    el.pushSync.addEventListener("click", () => pushSync(false));

    el.exportBtn.addEventListener("click", () => {
      const blob = new Blob([JSON.stringify(getAppData(), null, 2)], { type: "application/json" });
      const url = URL.createObjectURL(blob);
      const link = document.createElement("a");
      link.href = url;
      link.download = `weight-tracker-${todayIso()}.json`;
      link.click();
      URL.revokeObjectURL(url);
    });

    el.importInput.addEventListener("change", (event) => {
      const file = event.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = () => {
        try {
          applyAppData(mergeAppData(JSON.parse(String(reader.result || "{}"))));
          save();
          showToast("読み込みました");
        } catch {
          showToast("JSONを読み込めませんでした");
        }
      };
      reader.readAsText(file);
      event.target.value = "";
    });

    el.clearBtn.addEventListener("click", () => {
      if (!confirm("すべての体重データを削除しますか？")) return;
      state.weights = [];
      save();
      render();
      showToast("削除しました");
    });

    window.addEventListener("resize", drawWeightChart);

    if ("serviceWorker" in navigator) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("keto-service-worker.js").catch(() => {});
      });
    }

    load();
    render();
  </script>
</body>
</html>
